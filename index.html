<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR Balance Game</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="loginPanel" class="panel">
    <h1>WebXR Balance Game</h1>
    <p>Ingresa tu alias para participar</p>
    <input id="aliasInput" type="text" placeholder="Tu alias" />
    <button id="joinBtn">Entrar al juego</button>
  </div>

  <div id="gameUI" class="hud hidden">
    <h2>Balance colaborativo</h2>

    <div class="stats">
      <p>Izquierda: <strong id="leftCount">0</strong></p>
      <p>Derecha: <strong id="rightCount">0</strong></p>
      <p>Estado: <strong id="tiltState">Centrado</strong></p>
    </div>

    <div class="buttons">
      <button id="leftBtn">LEFT</button>
      <button id="rightBtn">RIGHT</button>
    </div>

    <p id="playerInfo"></p>
  </div>

  <a-scene background="color: #101820">
    <a-entity light="type: ambient; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="3 5 4"></a-entity>

    <a-plane 
      position="0 0 -3" 
      rotation="-90 0 0" 
      width="10" 
      height="10" 
      color="#2d3436">
    </a-plane>

    <a-box 
      id="platform"
      position="0 0.15 -3" 
      width="4" 
      height="0.3" 
      depth="2" 
      color="#636e72">
    </a-box>

    <a-cylinder 
      position="0 1.4 -3" 
      radius="0.08" 
      height="2.5" 
      color="#dfe6e9">
    </a-cylinder>

    <a-box 
      id="balanceBar"
      position="0 1.4 -3" 
      width="5" 
      height="0.12" 
      depth="0.12" 
      color="#f1c40f">
    </a-box>

    <a-sphere 
      position="0 1.4 -3" 
      radius="0.18" 
      color="#e74c3c">
    </a-sphere>

    <a-text 
      value="LEFT" 
      position="-3 1 -3" 
      align="center" 
      color="#74b9ff" 
      scale="1.5 1.5 1.5">
    </a-text>

    <a-text 
      value="RIGHT" 
      position="3 1 -3" 
      align="center" 
      color="#55efc4" 
      scale="1.5 1.5 1.5">
    </a-text>

    <a-box 
      position="-2.5 0.5 -3" 
      width="1" 
      height="1" 
      depth="1" 
      color="#0984e3">
    </a-box>

    <a-box 
      position="2.5 0.5 -3" 
      width="1" 
      height="1" 
      depth="1" 
      color="#00b894">
    </a-box>

    <a-camera position="0 2.2 4"></a-camera>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>
